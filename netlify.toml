# ── Netlify Configuration ─────────────────────────────────────────────────────
# Proyecto: IDEA Project Agency

[build]
  publish = "."

# ── Pretty URLs: elimina .html de todas las rutas ─────────────────────────────
# Redirige /pagina.html → /pagina  (301 permanente, SEO-safe)

[[redirects]]
  from   = "/*.html"
  to     = "/:splat"
  status = 301
  force  = true

# ── Headers de seguridad y caché ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
